<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>버튼 테스트</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      font-size: 24px;
      color: blue;
    }
  </style>
</head>
<body>

  <h1>웹 연결 테스트</h1>

  <button id="btn">눌러보세요</button>

  <div id="result"></div>

  <script>
    const btn = document.getElementById("btn");
    const result = document.getElementById("result");

    btn.addEventListener("click", async () => {

      result.innerText = "불러오는 중...";

      try {
        const response = await fetch("https://jsonplaceholder.typicode.com/todos/1");

        const data = await response.json();

        result.innerText = "가져온 데이터: " + data.title;

      } catch (error) {
        result.innerText = "에러 발생";
        console.error(error);
      }

    });
  </script>

</body>
</html>
