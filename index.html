
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 연결 예제</title>
</head>
<body>

  <h1>웹사이트 연결 테스트</h1>

  <button onclick="loadData()">데이터 가져오기</button>

  <p id="result"></p>

  <script>
    async function loadData() {
      try {
        // 예시 API 연결
        const response = await fetch('https://jsonplaceholder.typicode.com/todos/1');

        // JSON 변환
        const data = await response.json();

        // 화면 출력
        document.getElementById('result').innerText =
          "제목: " + data.title;

      } catch (error) {
        console.error(error);
        document.getElementById('result').innerText =
          "데이터를 불러오지 못했습니다.";
      }
    }
  </script>

</body>
</html>
