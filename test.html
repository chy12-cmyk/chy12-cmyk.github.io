```html id="recycle-guide-app"
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>분리수거 도우미</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 30px;
    }

    .box {
      max-width: 500px;
      background: white;
      margin: auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: green;
    }

    #question {
      font-size: 22px;
      margin: 20px 0;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: green;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }

    #result {
      margin-top: 25px;
      padding: 15px;
      background: #e8ffe8;
      border-radius: 10px;
      font-size: 20px;
      display: none;
    }
  </style>
</head>
<body>

<div class="box">

  <h1>♻️ 분리수거 도우미</h1>

  <div id="question">
    무엇을 버리시나요?
  </div>

  <div id="buttons">
    <button onclick="selectType('plastic')">플라스틱</button>
    <button onclick="selectType('can')">캔</button>
    <button onclick="selectType('paper')">종이</button>
    <button onclick="selectType('glass')">유리</button>
  </div>

  <div id="result"></div>

</div>

<script>

let currentType = "";

function selectType(type) {

  currentType = type;

  const question = document.getElementById("question");
  const buttons = document.getElementById("buttons");

  question.innerText = "내용물이 남아있나요?";

  buttons.innerHTML = `
    <button onclick="checkClean(true)">예</button>
    <button onclick="checkClean(false)">아니오</button>
  `;
}

function checkClean(hasContent) {

  const result = document.getElementById("result");

  result.style.display = "block";

  if (hasContent) {
    result.innerHTML =
      "🚫 내용물을 비우고 물로 헹군 뒤 분리수거 해주세요.";
    return;
  }

  let message = "";

  switch(currentType) {

    case "plastic":
      message = "✅ 플라스틱류로 분리배출하세요.";
      break;

    case "can":
      message = "✅ 캔류로 분리배출하세요.";
      break;

    case "paper":
      message = "✅ 종이류로 분리배출하세요.";
      break;

    case "glass":
      message = "✅ 유리류로 분리배출하세요.";
      break;
  }

  result.innerHTML = message + "<br><br>♻️ 올바른 분리수거 감사합니다!";
}

</script>

</body>
</html>
```
